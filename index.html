<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />

    <!-- Prevent flash of unstyled theme: read saved theme before render -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light") document.documentElement.classList.add("light");
        } catch (e) {}
      })();
    </script>

    <title>Rudransh Agrawal — Software Engineer at AWS</title>
    <meta
      name="description"
      content="Rudransh Agrawal is a software engineer at AWS building Baseboard Management Controllers for EC2 GPU servers. Previously Milwaukee Tool. Purdue MS Computer Engineering."
    />
    <meta name="author" content="Rudransh Agrawal" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.rudranshagrawal.com/" />
    <meta property="og:title" content="Rudransh Agrawal — Software Engineer at AWS" />
    <meta
      property="og:description"
      content="Software engineer building the systems behind AWS's GPU fleet. Embedded systems, multi-agent AI, and consumer health apps."
    />
    <meta property="og:image" content="https://www.rudranshagrawal.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rudransh Agrawal — Software Engineer at AWS" />
    <meta
      name="twitter:description"
      content="Software engineer building the systems behind AWS's GPU fleet."
    />
    <meta name="twitter:image" content="https://www.rudranshagrawal.com/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Font: JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Hidden form so Netlify's build-time form scanner picks up the
      topic-suggestion form. The visible form is rendered by React in
      src/components/Podcast.jsx and submitted via fetch.
    -->
    <form
      name="topic-suggestion"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="text" name="topic" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
