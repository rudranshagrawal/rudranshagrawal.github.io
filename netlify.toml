[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Proxy /api/* to Netlify Functions so the frontend can call /api/chat
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — keep AFTER the /api redirect so it doesn't swallow function calls
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
